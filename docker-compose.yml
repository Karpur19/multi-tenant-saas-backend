services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: saas-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/saas_db
      - JWT_SECRET=local-dev-jwt-secret-change-in-production
      - JWT_REFRESH_SECRET=local-dev-refresh-secret-change-in-production
      - JWT_EXPIRES_IN=7d
      - JWT_REFRESH_EXPIRES_IN=30d
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - saas-network

  db:
    image: postgres:16-alpine
    container_name: saas-postgres
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=saas_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d saas_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - saas-network

  adminer:
    image: adminer:latest
    container_name: saas-adminer
    ports:
      - "8080:8080"
    depends_on:
      - db
    networks:
      - saas-network
    profiles:
      - dev

volumes:
  postgres_data:
    driver: local

networks:
  saas-network:
    driver: bridge
