name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '18'
  IMAGE_NAME: multi-tenant-saas-backend

jobs:
  # ============================================
  # JOB 1: Run Tests
  # ============================================
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: saas_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/saas_test?sslmode=disable
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: saas_test
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_SSL: false
      JWT_SECRET: test-jwt-secret-for-ci
      JWT_REFRESH_SECRET: test-refresh-secret-for-ci
      JWT_EXPIRES_IN: 1h
      JWT_REFRESH_EXPIRES_IN: 1d

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🗄️ Apply schema directly via psql
        run: |
          # Find and run all migration SQL files directly
          PGPASSWORD=postgres psql \
            -h localhost \
            -U postgres \
            -d saas_test \
            -f src/migrations/001_initial_schema.sql
        continue-on-error: true

      - name: 🗄️ Run migrations via npm
        run: npm run migrate
        continue-on-error: true

      - name: ✅ Verify tables exist
        run: |
          PGPASSWORD=postgres psql \
            -h localhost \
            -U postgres \
            -d saas_test \
            -c "\dt"

      - name: 🌱 Seed test database
        run: npm run seed
        continue-on-error: true

      - name: 🧪 Run unit tests
        run: npm run test:unit

      - name: 🔗 Run integration tests
        run: npm run test:integration

      - name: 📊 Generate coverage report
        run: npm run test:coverage
        continue-on-error: true

      - name: 📤 Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ============================================
  # JOB 2: Code Quality
  # ============================================
  quality:
    name: 🔍 Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Run security audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: 📋 Check for outdated packages
        run: npm outdated
        continue-on-error: true

  # ============================================
  # JOB 3: Build Docker Image
  # ============================================
  build:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 📝 Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: 🏗️ Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # JOB 4: Deploy to Render
  # ============================================
  deploy:
    name: 🚀 Deploy to Render
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 🚀 Trigger Render Deploy
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"serviceId": "${{ secrets.RENDER_SERVICE_ID }}"}' \
            https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys

      - name: ⏳ Wait for deployment
        run: sleep 60

      - name: ✅ Verify deployment
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            https://multi-tenant-saas-backend-lars.onrender.com/health)
          if [ $response -eq 200 ]; then
            echo "✅ Deployment successful! Health check passed."
          else
            echo "❌ Deployment may have failed. Status code: $response"
            exit 1
          fi
